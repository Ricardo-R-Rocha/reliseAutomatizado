<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Revisar e Editar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
.card { background: white; padding: 20px; border-radius: 16px; max-width: 600px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
h3 { color: #1e293b; margin-top: 0; display: flex; align-items: center; gap: 10px; }
textarea { width: 100%; min-height: 540px; border-radius: 8px; border: 2px solid #cbd5e1; padding: 15px; font-family: monospace; font-size: 14px; box-sizing: border-box; background: #fff; line-height: 1.5; color: #1e293b; }
.actions { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
button { padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; font-size: 1rem; }
.btn-wa { background: #25D366; }
.btn-copy { background: #3b82f6; }
.btn-back { background: #64748b; }
</style>
</head>
<body>
<div class="card">
<h3><i class="fas fa-edit"></i> Ajuste Final</h3>
<textarea id="output"></textarea>
<div class="actions">
<button class="btn-wa" onclick="enviar()"><i class="fab fa-whatsapp"></i> ENVIAR PARA WHATSAPP</button>
<button class="btn-copy" onclick="copiar()"><i class="fas fa-copy"></i> COPIAR TEXTO</button>
<button class="btn-back" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> VOLTAR AO FORMULÁRIO</button>
</div>
</div>

<script>
const d = JSON.parse(localStorage.getItem("ocorrencia"));

if(d) {
const dataBR = d.data.split('-').reverse().join('/');
const horaFormatada = d.horario.replace(':', 'h') + 'min';

const msg = `*POLÍCIA MILITAR DA BAHIA*
*CPR-LESTE*
*Região ${d.regiao}*
*UOPM*: ${d.unidadePrincipal}

*TIPO DE OCORRÊNCIA:* ${d.tipo}

*RECURSO(S)*: ${d.recurso}

*ACUSADO:* ${d.acusado}

*VITIMA:* ${d.vitima}

*UNIDADE:* ${d.unidadeRelatorio}

*ENDEREÇO:* ${d.endereco}

*CIDADE*: ${d.cidade}

*DATA:* ${dataBR}

*HORÁRIO:* ${horaFormatada}

*RESUMO*:
${d.resumo}

*PROVIDÊNCIAS:*
${d.providencias}

*N° BO:* ${d.numeroOcorrencia}

*FONTE*: ${d.fonte}`;

document.getElementById("output").value = msg;
}

function enviar() {
const textoFinal = document.getElementById("output").value;
window.open(`https://wa.me/?text=${encodeURIComponent(textoFinal)}`, "_blank");
}

function copiar() {
const o = document.getElementById("output");
o.select();
navigator.clipboard.writeText(o.value);
alert("Copiado!");
}
</script>
</body>
</html>
